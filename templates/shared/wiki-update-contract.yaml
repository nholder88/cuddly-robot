version: 1.0.0
name: wiki-update-contract
policy:
  scope:
    githubDotCom: true
    ghesAllowlist: []
  trigger: stage7_pass
  failureMode: non_blocking_warning_audit
  outputMode: pr
  humanApproval: true
classification:
  include:
    - user_visible_functional_change
    - end_user_how_to
  exclude:
    - internal_refactor_only
    - low_level_framework_details
