version: 1.0.0
name: ci-main-workflow-template
purpose: Reusable main-branch CI workflow using canonical command slots.

inputs:
  stack_key: "{{ stack_key }}"
  working_directory: "{{ working_directory }}"

slot_tokens:
  - install
  - lint
  - build
  - unit_test
  - e2e_test

steps:
  - name: Install dependencies
    slot: install
  - name: Lint
    slot: lint
  - name: Build
    slot: build
  - name: Unit tests
    slot: unit_test
  - name: E2E tests
    slot: e2e_test

execution:
  command_source: templates/shared/ci-stack-command-matrix.yaml
  run_in_working_directory: true
  command_reference_format: "{{ matrix.stacks[stack_key][slot] }}"

governance:
  concurrency_group: "ci-main-{{ stack_key }}"
  cancel_in_progress: false
  path_filters:
    - "templates/**"
    - "src/**"
