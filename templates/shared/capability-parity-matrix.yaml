version: 1.0.0
name: capability-parity-matrix
purpose: Ensure identical platform functionality across languages and frameworks.

required_capabilities:
  - id: CAP-FF-001
    name: Feature Flag Evaluation
    must_have:
      - Runtime flag evaluation API
      - Role or audience targeting support
      - Audit event for flag decisions
  - id: CAP-FF-002
    name: Feature Flag Administration
    must_have:
      - Read flags endpoint/view
      - Update flag endpoint/view with audit trail
  - id: CAP-REP-001
    name: Reporting Definitions
    must_have:
      - List report definitions
      - Validate report filter payloads
  - id: CAP-REP-002
    name: Reporting Execution
    must_have:
      - Run report endpoint/action
      - Async job status and download flow
  - id: CAP-ADM-001
    name: Admin Dashboard
    must_have:
      - Dependency health panel
      - Audit activity panel
      - Feature flag panel
  - id: CAP-OBS-001
    name: Correlated Telemetry
    must_have:
      - Correlation ID propagation
      - Structured logs with request metadata
      - Error telemetry sink integration
  - id: CAP-SEC-001
    name: Authentication and Authorization
    must_have:
      - AuthN middleware/guard
      - Role/permission checks
  - id: CAP-DATA-001
    name: Data Mapping Layers
    must_have:
      - DTO to domain mapping
      - Domain to persistence mapping
      - Mapping unit tests
  - id: CAP-OPS-001
    name: Operational Readiness
    must_have:
      - /health and /ready endpoints
      - Config validation at startup
      - Graceful shutdown behavior

parity_gate:
  rule: No stack template can be accepted without mapping every capability ID.
  parity_evidence_schema: templates/shared/parity-evidence-schema.yaml
  required_output:
    - capability_id
    - implementation_location
    - verification_method

frontend_stack_mapping:
  nextjs:
    [
      CAP-FF-001,
      CAP-FF-002,
      CAP-REP-001,
      CAP-REP-002,
      CAP-ADM-001,
      CAP-OBS-001,
      CAP-SEC-001,
    ]
  sveltekit:
