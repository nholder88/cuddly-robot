      output_mode_default: pr
      human_approval_default: true
  - key: go
    framework: Fiber
    spec: templates/backend-go/template-spec.yaml
    env: templates/backend-go/.env.example
    wiki_update:
      enabled: true
      contract_ref: templates/shared/wiki-update-contract.yaml
      output_mode_default: pr
      human_approval_default: true
  - key: java
    framework: Spring Boot
    spec: templates/backend-java/template-spec.yaml
    env: templates/backend-java/.env.example
    wiki_update:
      enabled: true
      contract_ref: templates/shared/wiki-update-contract.yaml
      output_mode_default: pr
      human_approval_default: true
  - key: rust
