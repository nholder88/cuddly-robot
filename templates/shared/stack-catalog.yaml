version: 1.0.0
name: stack-catalog
purpose: Canonical list of supported stacks and which template files define them.

frontend:
  - key: nextjs
    framework: Next.js
    spec: templates/frontend-nextjs/template-spec.yaml
    env: templates/frontend-nextjs/.env.example
    state_management: Zustand + TanStack Query
    wiki_update:
      enabled: true
      contract_ref: templates/shared/wiki-update-contract.yaml
      output_mode_default: pr
      human_approval_default: true
  - key: sveltekit
    framework: SvelteKit
    spec: templates/frontend-sveltekit/template-spec.yaml
    env: templates/frontend-sveltekit/.env.example
    state_management: Svelte stores + TanStack Query
    wiki_update:
      enabled: true
      contract_ref: templates/shared/wiki-update-contract.yaml
      output_mode_default: pr
      human_approval_default: true
  - key: angular
    framework: Angular
    spec: templates/frontend-angular/template-spec.yaml
    env: templates/frontend-angular/.env.example
    state_management: NgRx + RxJS services
    wiki_update:
      enabled: true
      contract_ref: templates/shared/wiki-update-contract.yaml
      output_mode_default: pr
      human_approval_default: true

