version: 1.0.0
template: backend-go
purpose: Go service baseline with capability parity.

framework:
  name: Fiber
  language: Go
  data_access: sqlc or GORM

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001
  - CAP-DATA-001
  - CAP-OPS-001

implementation_guidance:
  logging: zerolog or slog with correlation fields
  auth: JWT middleware + role checks
  mapping: DTO/domain/persistence structs with mapper funcs
  health: /health and /ready dependency probes
  flags: Provider adapter interface + cache fallback
  reporting: Async job worker with status/download endpoints

ci_command_contract:
  stack_key: go
  slots:
    unit_test: go test ./... -short
    e2e_test: go test ./... -run TestE2E

testing_starter:
  unit:
    slot: unit_test
    command: go test ./... -short
    framework: testing package
    sample_target: internal/reporting/service_test.go
  e2e:
    slot: e2e_test
    command: go test ./... -run TestE2E
    mode: api
    semantics: API smoke/integration suite for health, reporting, and admin endpoints.
    sample_target: internal/e2e/api_smoke_test.go

wiki_update:
  enabled: true
  contract_ref: templates/shared/wiki-update-contract.yaml
  output_mode_default: pr
  human_approval_default: true
