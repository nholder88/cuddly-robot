version: 1.0.0
template: backend-java
purpose: Spring Boot baseline with capability parity.

framework:
  name: Spring Boot
  language: Java
  data_access: Spring Data JPA

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001
  - CAP-DATA-001
  - CAP-OPS-001

implementation_guidance:
  logging: Logback JSON appender with MDC correlation IDs
  auth: Spring Security resource server + method security
  mapping: MapStruct mappers tested per domain boundary
  health: Spring Actuator health/readiness groups
  flags: Provider adapter with admin APIs
  reporting: Async report orchestration and job tracking

ci_command_contract:
  stack_key: java
  slots:
    unit_test: ./mvnw -q test
    e2e_test: ./mvnw -q verify -Pe2e

testing_starter:
  unit:
    slot: unit_test
    command: ./mvnw -q test
    framework: JUnit
    sample_target: src/test/java/com/example/reporting/ReportingServiceTest.java
  e2e:
    slot: e2e_test
    command: ./mvnw -q verify -Pe2e
    mode: api
    semantics: API smoke/integration suite for health, reporting, and admin endpoints.
    sample_target: src/test/java/com/example/e2e/ApiSmokeIT.java

wiki_update:
  enabled: true
  contract_ref: templates/shared/wiki-update-contract.yaml
  output_mode_default: pr
  human_approval_default: true
