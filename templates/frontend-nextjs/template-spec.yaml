version: 1.0.0
template: frontend-nextjs
purpose: Next.js frontend baseline with consistent platform hooks.

framework:
  name: Next.js
  rendering: App Router + Server Components where appropriate
  language: TypeScript

state_management:
  server_state: TanStack Query
  client_state: Zustand
  form_state: React Hook Form + Zod
  guidance:
    - Keep server state in query cache
    - Keep UI state in feature-local Zustand stores

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001

required_routes:
  - /reports
  - /admin
  - /admin/feature-flags
  - /admin/audit

required_integrations:
  - feature_flag_client_adapter
  - telemetry_provider_adapter
  - correlation_id_http_client

ci_command_contract:
  stack_key: nextjs
  slots:
    unit_test: npm run test:unit
    e2e_test: npm run test:e2e

testing_starter:
  unit:
    slot: unit_test
    command: npm run test:unit
    framework: Vitest
    sample_target: src/features/reports/report-service.test.ts
  e2e:
    slot: e2e_test
    command: npm run test:e2e
    mode: browser
    semantics: Browser journey for report and admin feature-flag flows.
    sample_target: tests/e2e/reporting-admin.spec.ts

wiki_update:
  enabled: true
  contract_ref: templates/shared/wiki-update-contract.yaml
  output_mode_default: pr
  human_approval_default: true
