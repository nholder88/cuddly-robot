version: 1.0.0
template: backend-go
purpose: Go service baseline with capability parity.

framework:
  name: Fiber
  language: Go
  data_access: sqlc or GORM

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001
  - CAP-DATA-001
  - CAP-OPS-001

implementation_guidance:
  logging: zerolog or slog with correlation fields
  auth: JWT middleware + role checks
  mapping: DTO/domain/persistence structs with mapper funcs
  health: /health and /ready dependency probes
  flags: Provider adapter interface + cache fallback
  reporting: Async job worker with status/download endpoints
