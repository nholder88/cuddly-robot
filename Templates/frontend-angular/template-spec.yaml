version: 1.0.0
template: frontend-angular
purpose: Angular frontend baseline with consistent platform hooks.

framework:
  name: Angular
  rendering: SPA
  language: TypeScript

state_management:
  server_state: NgRx effects + entity cache
  client_state: NgRx store slices
  form_state: Reactive Forms + validators
  guidance:
    - Keep remote data orchestration in NgRx effects
    - Keep feature state in strongly typed selectors/actions

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001

required_routes:
  - /reports
  - /admin
  - /admin/feature-flags
  - /admin/audit

required_integrations:
  - feature_flag_client_adapter
  - telemetry_provider_adapter
  - correlation_id_http_client
