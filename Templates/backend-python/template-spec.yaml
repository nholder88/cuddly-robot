version: 1.0.0
template: backend-python
purpose: FastAPI baseline with capability parity.

framework:
  name: FastAPI
  language: Python
  data_access: SQLAlchemy + Alembic

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001
  - CAP-DATA-001
  - CAP-OPS-001

implementation_guidance:
  logging: structlog + uvicorn access logs
  auth: JWT validation dependency + role guards
  mapping: Pydantic DTOs separated from ORM models
  health: /health and /ready with dependency checks
  flags: Provider adapter with local fallback
  reporting: Background tasks/queue with status polling
