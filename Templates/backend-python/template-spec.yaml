version: 1.0.0
template: backend-python
purpose: FastAPI baseline with capability parity.

framework:
  name: FastAPI
  language: Python
  data_access: SQLAlchemy + Alembic

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001
  - CAP-DATA-001
  - CAP-OPS-001

implementation_guidance:
  logging: structlog + uvicorn access logs
  auth: JWT validation dependency + role guards
  mapping: Pydantic DTOs separated from ORM models
  health: /health and /ready with dependency checks
  flags: Provider adapter with local fallback
  reporting: Background tasks/queue with status polling

ci_command_contract:
  stack_key: python
  slots:
    unit_test: pytest -m "not e2e"
    e2e_test: pytest -m "e2e or smoke"

testing_starter:
  unit:
    slot: unit_test
    command: pytest -m "not e2e"
    framework: pytest
    sample_target: tests/unit/test_reporting_service.py
  e2e:
    slot: e2e_test
    command: pytest -m "e2e or smoke"
    mode: api
    semantics: API smoke/integration suite for health, reporting, and admin endpoints.
    sample_target: tests/e2e/test_api_smoke.py
