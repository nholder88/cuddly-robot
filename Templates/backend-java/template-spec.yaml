version: 1.0.0
template: backend-java
purpose: Spring Boot baseline with capability parity.

framework:
  name: Spring Boot
  language: Java
  data_access: Spring Data JPA

required_capabilities:
  - CAP-FF-001
  - CAP-FF-002
  - CAP-REP-001
  - CAP-REP-002
  - CAP-ADM-001
  - CAP-OBS-001
  - CAP-SEC-001
  - CAP-DATA-001
  - CAP-OPS-001

implementation_guidance:
  logging: Logback JSON appender with MDC correlation IDs
  auth: Spring Security resource server + method security
  mapping: MapStruct mappers tested per domain boundary
  health: Spring Actuator health/readiness groups
  flags: Provider adapter with admin APIs
  reporting: Async report orchestration and job tracking
